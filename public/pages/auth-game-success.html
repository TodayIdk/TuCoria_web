<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TuCoria</title>
<link rel="icon" href="/assets/logosite.png" />
<link rel="stylesheet" href="/css/common.css" />
<link rel="stylesheet" href="/css/auth.css" />
<style>
  .game-auth-card {
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px;
    background: #fff;
    text-align: center;
  }
  .game-auth-card .logo { justify-content: center; margin-bottom: 20px; }
  .game-auth-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .game-auth-card .desc { color: var(--muted); font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="game-auth-card">
    <div class="logo">
      <img src="/assets/logo.png" alt="TuCoria" />
      <span>TuCoria</span>
    </div>
    <h1>✅ Authorized</h1>
    <p class="desc">Your TuCoria client is now connected.<br>You can close this tab and return to the game.</p>
  </div>
</div>
</body>
</html>
