<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TuCoria</title>
<link rel="icon" href="/assets/logosite.png" />
<link rel="stylesheet" href="/css/common.css" />
<link rel="stylesheet" href="/css/ban.css" />
</head>
<body>
<div class="ban-wrap">
  <div class="ban-card" id="banCard">
    <div class="ban-icon" id="banIcon">!</div>
    <div class="ban-badge" id="banBadge">Notice</div>
    <h1 id="banTitle">Account Notice</h1>

    <div class="ban-message" id="banMessage">Loading...</div>

    <div class="ban-info-grid">
      <div class="ban-info-row"><span>Username</span><b id="banUsername">—</b></div>
      <div class="ban-info-row"><span>User ID</span><b id="banUserId">—</b></div>
      <div class="ban-info-row"><span>Issued</span><b id="banDate">—</b></div>
      <div class="ban-info-row" id="expiresRow"><span>Expires in</span><b id="banExpires">—</b></div>
      <div class="ban-info-row"><span>Severity</span><b id="banSeverity">—</b></div>
    </div>

    <div class="ban-reason-box">
      <div class="ban-reason-label">Detected reason</div>
      <div id="banReason">—</div>
    </div>

    <div class="ban-actions">
      <button class="btn" id="acknowledgeBtn">I Understand — Log Out</button>
    </div>

    <div class="ban-footer">
      With respect,<br/>
      <b>TuCoria AI Moderation</b>
    </div>
  </div>
</div>

<script src="/js/ban.js"></script>
</body>
</html>
